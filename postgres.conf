# PostgreSQL Development Configuration for Performance
# This config is optimized for development, not production

# Connection Settings
listen_addresses = '*'
port = 5432
max_connections = 100

# Memory Settings (optimized for development)
shared_buffers = 256MB
effective_cache_size = 1GB
maintenance_work_mem = 64MB
work_mem = 4MB

# WAL Settings (faster for dev, less durable)
wal_level = minimal
max_wal_senders = 0
fsync = off
synchronous_commit = off
checkpoint_completion_target = 0.9
wal_buffers = 16MB

# Query Tuning
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Logging (useful for development debugging)
log_statement = 'all'
log_min_duration_statement = 0
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on

# Development-friendly settings
log_lock_waits = on
log_temp_files = 0
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
track_activity_query_size = 2048
