name: Retrain AI Model

on:
  schedule:
    # Every Monday at 03:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Skip the minimum-interaction threshold check"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  retrain:
    name: Incremental model retraining
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check unused interaction count
        id: check_threshold
        if: ${{ github.event.inputs.force != 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TRAINING_THRESHOLD: ${{ vars.TRAINING_THRESHOLD || '30' }}
        run: |
          COUNT=$(node --input-type=module <<'EOF'
          import postgres from "postgres";
          const sql = postgres(process.env.DATABASE_URL, { max: 1 });
          const [{ count }] = await sql`
            SELECT COUNT(*) AS count FROM candidate_interactions WHERE trained_at IS NULL
          `;
          await sql.end({ timeout: 5 });
          process.stdout.write(String(count));
          EOF
          )
          echo "unused_count=$COUNT" >> "$GITHUB_OUTPUT"
          THRESHOLD="${TRAINING_THRESHOLD:-30}"
          if [ "$COUNT" -lt "$THRESHOLD" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "[retrain] Only $COUNT unused interactions (threshold: $THRESHOLD). Skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "[retrain] $COUNT unused interactions — proceeding with retraining."
          fi

      - name: Run incremental training
        if: ${{ steps.check_threshold.outputs.skip != 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter training train:incremental

      - name: Upload model files to S3
        if: ${{ steps.check_threshold.outputs.skip != 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          aws s3 sync apps/web/public/ai-models/ "s3://$S3_BUCKET/ai-models/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "latest.json"
          # latest.json must not be cached aggressively so browsers pick up new versions fast
          aws s3 cp apps/web/public/ai-models/latest.json \
            "s3://$S3_BUCKET/ai-models/latest.json" \
            --cache-control "public, max-age=60, must-revalidate"

      - name: Invalidate CloudFront cache for latest.json
        if: ${{ steps.check_threshold.outputs.skip != 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/ai-models/latest.json"

      - name: Commit updated latest.json
        if: ${{ steps.check_threshold.outputs.skip != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/ai-models/latest.json
          git diff --cached --quiet || git commit -m "chore: model retrain [skip ci]"
          git push
